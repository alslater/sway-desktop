# sway_startup.conf — apps to launch at login and which workspace to put them on
#
# Format:  <workspace>  <command>
#
# workspace : 1–9, 'scratchpad', or 'pwa:<N>' (Edge PWA — also relaunched by restart-chrome.py)
# command   : shell command (same names as in ~/bin/startup_apps.sh)
#
# Apps are started one at a time; the script waits up to 30 s for each window
# to appear before moving on, so ordering matters for slow-starting apps.

11          edge
pwa:11      zabbix
pwa:1       teams
pwa:1       opsgenie
pwa:1       outlook
12          firefox
scratchpad  telegram-desktop
pwa:scratchpad  whatsapp
pwa:scratchpad  breathe
scratchpad  evolution
